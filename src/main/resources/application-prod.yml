server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/keepfit?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PWD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis ✅ 已开启连接池
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PWD:}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 32
        max-idle: 16
        min-idle: 4
        max-wait: 1000ms

logging:
  config: classpath:logback-spring.xml
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: warn
    com.example.demo: info
  file:
    name: logs/keepfit.log