spring:
  datasource:
    # 关键：rewriteBatchedStatements=true 开启真批量插入
    url: jdbc:mysql://localhost:3306/keepfit?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
    static-path-pattern: /**
  web:
    resources:
      add-mappings: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  # 扫描自定义的TypeHandler（核心配置）
  type-handlers-package: com.example.demo.common.handler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    cache-enabled: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ======================
# 🔥 【极简兼容版】Sa-Token 配置
# ======================
sa-token:
  token-name: token
  is-read-header: true
  is-read-cookie: false
  token-style: uuid
  timeout: 2592000
  active-timeout: 86400
  is-concurrent: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

order:
  timeout: 30

server:
  port: 8080

logging:
  config: classpath:logback-spring.xml
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: info
    com.example.demo: debug
  file:
    name: logs/keepfit.log